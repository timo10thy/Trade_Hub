services:
  tradehub_db:
    image: mysql:8.0
    container_name: tradehub_db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_ROOT_HOST=%
    ports:
      - "${FORWARD_DB_PORT}:3306"
    volumes:
      - tradehub_db_data:/var/lib/mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 120s

  tradehub_redis:
    image: redis:7-alpine
    container_name: tradehub_redis
    ports:
      - "6379:6379"
    volumes:
      - tradehub_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tradehub_app:
    container_name: tradehub_app
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      tradehub_db:
        condition: service_healthy
      tradehub_redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tradehub_db_data:
  tradehub_redis_data:
