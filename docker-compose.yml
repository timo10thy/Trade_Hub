services:
  tradehub_db:
    image: postgres:16-alpine
    container_name: tradehub_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "${FORWARD_DB_PORT}:5432"
    volumes:
      - tradehub_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  tradehub_redis:
    image: redis:7-alpine
    container_name: tradehub_redis
    ports:
      - "6379:6379"
    volumes:
      - tradehub_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  tradehub_app:
    container_name: tradehub_app
    build: ./backend
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      tradehub_db:
        condition: service_healthy
      tradehub_redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  tradehub_db_data:
  tradehub_redis_data:
